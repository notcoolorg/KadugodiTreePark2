kind = "web"
previewPath = "/"
title = "Scotland Yard - Multiplayer"
version = "1.0.0"
id = "artifacts/scotland-yard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22504
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/scotland-yard run dev"

[services.env]
PORT = "22504"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/scotland-yard", "run", "build"]
publicDir = "artifacts/scotland-yard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
